<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" autocomplete="on" novalidate >
    <input type="text" readonly value="aaa"> <br>
    <input type="text"  disabled><br>
    <input type="text" size="10"><br>
    <input type="text" maxlength="10" ><br>
      <input type="text" placeholder="enter name"><br>
      <input type="text" required><br>
    <input type="text" size="20"><br>
    <input type="number" name="" id="" min="5" max="8"><br>

    <input type="text" pattern="[0-9]{4}" placeholder="enter pin xxxx"><br>
    <input type="tel" pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}" placeholder="333-33-333"><br>
    <input type="text" pattern="[A-Z]{2}" placeholder=""><br>
    <input type="text" pattern="[A-Za-z]{2}" placeholder=""><br>
     <input type="text" autofocus><br>
     <input type="text" autocomplete="on"><br>

     <input type="file" name="" id="" multiple><br>
      <input type="submit" value="submit" >

    </form>

    <form action="" method="get">
        <input type="text" placeholder="enter name">
        <input type="email" name="" id="" placeholder="email">
        <input type="submit" value="value">
    </form>

</body>
</html>
