<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        span{
            background-color: yellow;
            height: 200px;
            width: 200px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <!-- we can't change height & width of inline elements if
      we want to change use display property in css and set its value as inline-block -->
    <span>hiiii</span>
</body>
</html>
