<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 200px;
            width: 200px;
        }
        #d1{
            background-image: linear-gradient(red,green,blue);
            background-image: linear-gradient(to top,red,green,blue);
            background-image: linear-gradient(to left,red,green,blue);
            background-image: linear-gradient(to right,red,green,blue);
            background-image: linear-gradient(to top left,red,green,blue);
            background-image: linear-gradient(to bottom right,red,green,blue);
            background-image: linear-gradient(to top right,red,green,blue);
            background-image: linear-gradient(to bottom left,red,green,blue);
        }
        #d2{
            background-image: linear-gradient(90deg,yellow,green);
             background-image: linear-gradient(180deg,yellow,green);
              background-image: linear-gradient(270deg,yellow,green);
               background-image: linear-gradient(0deg,yellow,green);
                background-image: linear-gradient(360deg,yellow,green);
        }
        #d3{
            background-image: linear-gradient(to right,rgba(255,0,0,0),rgba(255,0,0,1));
        }
        #d4{
              background-image: repeating-linear-gradient(red 10%, yellow 20%);
               background-image: repeating-linear-gradient(to bottom right,red 10%, yellow 20%);
        }
    </style>
</head>
<body>
    <div id="d1"></div>
    <br>
    <div id="d2"></div>
    <br>
    <div id="d3"></div>
     <br>
    <div id="d4"></div>
</body>
</html>
